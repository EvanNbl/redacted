name: Build & Release (Windows)

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Validate required secrets
        shell: pwsh
        run: |
          $missing = @()
          $secrets = @{
            "NEXT_PUBLIC_SUPABASE_URL" = "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
            "NEXT_PUBLIC_SUPABASE_ANON_KEY" = "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
            "NEXT_PUBLIC_ADMIN_EMAIL" = "${{ secrets.NEXT_PUBLIC_ADMIN_EMAIL }}"
            "TAURI_SIGNING_PRIVATE_KEY" = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          }
          foreach ($key in $secrets.Keys) {
            if ([string]::IsNullOrWhiteSpace($secrets[$key])) {
              $missing += $key
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required secrets: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All required secrets are set."

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate Windows icon (valid .ico for RC.EXE)
        run: node scripts/generate-ico.cjs

      - name: Build and release
        uses: tauri-apps/tauri-action@action-v0.5.25
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATE_TOKEN: ${{ secrets.TAURI_UPDATE_TOKEN }}
          TAURI_ENABLE_DEVTOOLS: ${{ secrets.TAURI_ENABLE_DEVTOOLS }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ADMIN_EMAIL: ${{ secrets.NEXT_PUBLIC_ADMIN_EMAIL }}
          NEXT_PUBLIC_UPDATER_TOKEN: ${{ secrets.TAURI_UPDATE_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "App v__VERSION__"
          releaseBody: "Voir les assets pour télécharger et installer."
          releaseDraft: true
          prerelease: true
          retryAttempts: 2
